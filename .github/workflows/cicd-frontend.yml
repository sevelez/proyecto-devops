name: Deploy Frontend to ECR and EC2

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'proyecto_semestral/front_despacho/**'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 103446603104.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: ev2-frontend
  CONTAINER_NAME: frontend-app

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest ./proyecto_semestral/front_despacho
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "cd /home/ubuntu/proyecto-devops",
              "sudo docker-compose pull",
              "sudo docker-compose up -d"
            ]' \
            --region ${{ env.AWS_REGION }}