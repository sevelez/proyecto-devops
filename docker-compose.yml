version: '3.8'

services:
  # Base de Datos: MySQL
  db-mysql:
    image: mysql:8.0
    container_name: db-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - ev2_mysql_data:/var/lib/mysql  # Persistencia de datos db mysql crítica
    networks:
      - ev2-devops
    deploy:
      resources:
        limits:
          memory: 300M

  # API Ventas
  backend-ventas:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:ventas
    container_name: backend-ventas
    restart: always
    ports:
      - "8081:8080"
    environment:
      - DB_ENDPOINT=db-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db-mysql
    networks:
      - ev2-devops
    deploy:
      resources:
        limits:
          memory: 350M

  # API Despachos
  backend-despachos:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:despachos
    container_name: backend-despachos
    restart: always
    ports:
      - "8082:8081"
    environment:
      - DB_ENDPOINT=db-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db-mysql
    networks:
      - ev2-devops
    deploy:
      resources:
        limits:
          memory: 350M

  # Frontend
  frontend-app:
    image: ${ECR_REGISTRY}/ev2-frontend:latest
    container_name: frontend-web
    restart: always
    ports:
      - "80:80"
    networks:
      - ev2-devops

# Persistencia del volumen
volumes:
  ev2_mysql_data:
    driver: local

# Red personalizada para la evaluacion
networks:
  ev2-devops:
    driver: bridge
